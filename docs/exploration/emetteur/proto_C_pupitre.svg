<svg viewBox="0 0 1150 810" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, monospace">
  <style>
    .ch { fill: none; stroke: #222; stroke-width: 2; }
    .th { fill: none; stroke: #222; stroke-width: 1; }
    .an { fill: #444; font-size: 12px; }
    .lb { fill: #222; font-size: 11px; letter-spacing: 0.08em; }
    .num { fill: #fff; font-size: 11px; font-weight: bold; text-anchor: middle; }
    .numc { fill: #222; }
    .dark { fill: #1c1c1c; }
    .seg { fill: #e8e8e8; letter-spacing: 3px; }
    .mot { stroke: #777; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; }
  </style>

  <text x="80" y="46" font-size="20" fill="#111" letter-spacing="2">PROTO C — LE PUPITRE</text>
  <text x="80" y="68" class="an">Une mini console de diffusion. Le geste : un crossfader ATELIER ⟷ TOI — l'héritage DJ de Vincent.</text>

  <!-- bandeau de vumètres (partie verticale) -->
  <rect x="150" y="130" width="850" height="105" class="ch"/>

  <!-- 1 : deux VU -->
  <rect x="175" y="148" width="170" height="70" rx="4" class="ch"/>
  <path d="M 205 205 A 62 62 0 0 1 315 205" class="th"/>
  <line x1="260" y1="208" x2="230" y2="164" stroke="#222" stroke-width="2"/>
  <circle cx="260" cy="208" r="4" fill="#222"/>
  <text x="260" y="232" class="lb" text-anchor="middle" font-size="9">ATELIER</text>
  <rect x="360" y="148" width="170" height="70" rx="4" class="ch"/>
  <path d="M 390 205 A 62 62 0 0 1 500 205" class="th"/>
  <line x1="445" y1="208" x2="472" y2="162" stroke="#222" stroke-width="2"/>
  <circle cx="445" cy="208" r="4" fill="#222"/>
  <text x="445" y="232" class="lb" text-anchor="middle" font-size="9">ANTENNE</text>
  <circle cx="186" cy="158" r="10" class="numc"/><text x="186" y="162" class="num">1</text>

  <!-- 2 : afficheur + fréquence -->
  <rect x="560" y="148" width="290" height="42" class="dark"/>
  <text x="574" y="176" class="seg" font-size="18">TRANSITION·???</text>
  <rect x="560" y="196" width="110" height="30" class="dark"/>
  <text x="572" y="218" class="seg" font-size="16">88.70</text>
  <text x="684" y="216" class="an" font-size="10">MHz — même fréquence en Night Drive</text>
  <circle cx="572" cy="158" r="10" class="numc" fill="#666"/><text x="572" y="162" class="num">2</text>

  <!-- 3 : haut-parleur témoin + ON AIR -->
  <circle cx="925" cy="182" r="34" class="ch"/>
  <g class="th">
    <line x1="903" y1="170" x2="947" y2="170"/><line x1="899" y1="182" x2="951" y2="182"/>
    <line x1="903" y1="194" x2="947" y2="194"/>
  </g>
  <circle cx="925" cy="140" r="7" fill="#222"/>
  <text x="925" y="130" class="lb" text-anchor="middle" font-size="9">ON AIR</text>
  <circle cx="884" cy="150" r="10" class="numc"/><text x="884" y="154" class="num">3</text>

  <!-- face inclinée (trapèze) -->
  <path d="M 150 235 L 1000 235 L 1040 430 L 110 430 Z" class="ch"/>

  <!-- 4 : crossfader -->
  <line x1="260" y1="345" x2="890" y2="345" stroke="#222" stroke-width="4"/>
  <rect x="255" y="341" width="640" height="8" class="th"/>
  <rect x="300" y="322" width="34" height="46" class="ch"/>
  <line x1="317" y1="322" x2="317" y2="368" class="th"/>
  <text x="240" y="310" class="lb" font-size="13">ATELIER</text>
  <text x="852" y="310" class="lb" font-size="13">TOI</text>
  <path d="M 350 332 h 90" class="mot"/>
  <path d="M 432 326 l 12 6 l -12 6" fill="none" stroke="#777" stroke-width="1.2"/>
  <g class="th">
    <line x1="290" y1="358" x2="290" y2="366"/><line x1="380" y1="358" x2="380" y2="366"/>
    <line x1="470" y1="358" x2="470" y2="366"/><line x1="560" y1="358" x2="560" y2="366"/>
    <line x1="650" y1="358" x2="650" y2="366"/><line x1="740" y1="358" x2="740" y2="366"/>
    <line x1="830" y1="358" x2="830" y2="366"/>
  </g>
  <circle cx="270" cy="330" r="10" class="numc"/><text x="270" y="334" class="num">4</text>

  <!-- 5 : ÉJECT + ÉCOUTE sur la face inclinée -->
  <rect x="930" y="322" width="76" height="34" class="ch"/>
  <text x="968" y="344" class="lb" text-anchor="middle">ÉJECT</text>
  <circle cx="942" cy="316" r="10" class="numc"/><text x="942" y="320" class="num">5</text>
  <rect x="150" y="390" width="18" height="28" rx="9" class="ch"/>
  <circle cx="159" cy="399" r="6" fill="#222"/>
  <text x="180" y="410" class="lb">ÉCOUTE</text>
  <circle cx="142" cy="382" r="10" class="numc"/><text x="142" y="386" class="num">6</text>

  <!-- profil (vue de côté) -->
  <g>
    <text x="80" y="480" class="an" font-size="10">PROFIL</text>
    <path d="M 90 560 L 90 535 L 205 505 L 205 560 Z" class="th"/>
    <line x1="118" y1="529" x2="128" y2="526" stroke="#222" stroke-width="3"/>
  </g>

  <!-- légende -->
  <text x="260" y="480" font-size="13" fill="#111" letter-spacing="1">COMMANDES &amp; GESTES</text>
  <text x="260" y="504" class="an">1. Deux VU — ATELIER (ce que la ligne fabrique) et ANTENNE (ce qui part dans l'onde). Les deux dansent en continu ;</text>
  <text x="260" y="520" class="an">   quand tu prends l'antenne, ils se désynchronisent — l'atelier continue de vivre derrière toi.</text>
  <text x="260" y="540" class="an">2. Afficheur + fréquence — ce qui passe ; « ??? » pour les fragments jamais expliqués.</text>
  <text x="260" y="560" class="an">3. Haut-parleur témoin + ON AIR — la lampe respire, jamais éteinte.</text>
  <text x="260" y="580" class="an">4. LE CROSSFADER — geste signature. Au repos : côté ATELIER, avec des micro-ajustements (fader motorisé).</text>
  <text x="260" y="596" class="an">   Ouvrir un morceau : le fader GLISSE TOUT SEUL vers TOI (moteur audible). Le pousser à la main marche aussi —</text>
  <text x="260" y="612" class="an">   et à mi-course, on entend réellement les deux mondes se croiser (l'émission sous ton morceau).</text>
  <text x="260" y="632" class="an">5. ÉJECT — rendre l'antenne : le fader revient seul, en douceur, côté ATELIER.</text>
  <text x="260" y="652" class="an">6. ÉCOUTE — couper le son ne coupe rien d'autre : aiguilles et fader continuent leur vie.</text>

  <text x="260" y="688" font-size="13" fill="#111" letter-spacing="1">VIE AU REPOS</text>
  <text x="260" y="710" class="an">Le fader motorisé qui se réajuste tout seul est le signe de vie le plus fort des trois protos :</text>
  <text x="260" y="726" class="an">une commande qui bouge sans main humaine = quelqu'un d'autre est aux manettes. L'atelier.</text>

  <!-- inset Night Drive -->
  <g>
    <text x="80" y="600" font-size="13" fill="#111" letter-spacing="1" transform="rotate(0)"></text>
    <text x="740" y="688" font-size="13" fill="#111" letter-spacing="1">NIGHT DRIVE (D12)</text>
    <rect x="740" y="700" width="330" height="72" class="th"/>
    <rect x="754" y="716" width="140" height="40" class="ch"/>
    <line x1="766" y1="742" x2="882" y2="742" stroke="#222" stroke-width="2"/>
    <rect x="800" y="736" width="12" height="12" class="th"/>
    <path d="M 902 736 h 28" class="mot"/>
    <path d="M 924 730 l 10 6 l -10 6" fill="none" stroke="#777" stroke-width="1.2"/>
    <rect x="944" y="716" width="112" height="40" class="ch"/>
    <line x1="954" y1="742" x2="1046" y2="742" stroke="#222" stroke-width="2"/>
    <rect x="984" y="736" width="10" height="12" class="th"/>
    <text x="754" y="712" class="an" font-size="10">le pupitre s'aplatit ; le crossfader devient le curseur de fréquence du dash</text>
  </g>

  <!-- cartouche -->
  <g>
    <rect x="760" y="30" width="310" height="72" class="th"/>
    <line x1="760" y1="54" x2="1070" y2="54" class="th"/>
    <line x1="760" y1="78" x2="1070" y2="78" class="th"/>
    <text x="770" y="47" class="an">VINCENT 2000 OS — ÉMETTEUR « V2000 TX »</text>
    <text x="770" y="71" class="an">PROTO C / 3 — wireframe fonctionnel</text>
    <text x="770" y="95" class="an">2026-07-03 — aucune décision esthétique</text>
  </g>
</svg>
