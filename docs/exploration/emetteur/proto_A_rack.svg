<svg viewBox="0 0 1150 810" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, Menlo, monospace">
  <style>
    .ch { fill: none; stroke: #222; stroke-width: 2; }
    .th { fill: none; stroke: #222; stroke-width: 1; }
    .an { fill: #444; font-size: 12px; }
    .lb { fill: #222; font-size: 11px; letter-spacing: 0.08em; }
    .num { fill: #fff; font-size: 11px; font-weight: bold; text-anchor: middle; }
    .numc { fill: #222; }
    .dark { fill: #1c1c1c; }
    .seg { fill: #e8e8e8; font-size: 22px; letter-spacing: 4px; }
    .mot { stroke: #777; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; }
  </style>

  <text x="80" y="46" font-size="20" fill="#111" letter-spacing="2">PROTO A — LE RACK</text>
  <text x="80" y="68" class="an">Unité de diffusion 2U. La machine décide, le visiteur assiste — la prise d'antenne est signalée, pas actionnée.</text>

  <!-- oreilles de rack -->
  <rect x="50" y="140" width="30" height="250" class="ch"/>
  <rect x="1070" y="140" width="30" height="250" class="ch"/>
  <circle cx="65" cy="170" r="7" class="th"/><circle cx="65" cy="360" r="7" class="th"/>
  <circle cx="1085" cy="170" r="7" class="th"/><circle cx="1085" cy="360" r="7" class="th"/>

  <!-- façade -->
  <rect x="80" y="140" width="990" height="250" class="ch"/>

  <!-- 1 : VU-mètre -->
  <rect x="110" y="170" width="230" height="135" rx="6" class="ch"/>
  <path d="M 150 275 A 95 95 0 0 1 300 275" class="th"/>
  <line x1="152" y1="270" x2="160" y2="260" class="th"/>
  <line x1="186" y1="238" x2="192" y2="248" class="th"/>
  <line x1="225" y1="228" x2="225" y2="240" class="th"/>
  <line x1="264" y1="238" x2="258" y2="248" class="th"/>
  <path d="M 282 250 A 95 95 0 0 1 298 273" stroke="#222" stroke-width="4" fill="none"/>
  <line x1="225" y1="292" x2="187" y2="222" stroke="#222" stroke-width="2.5"/>
  <circle cx="225" cy="292" r="5" fill="#222"/>
  <text x="225" y="322" class="lb" text-anchor="middle">LIGNE ATELIER</text>
  <path d="M 190 210 q 10 -14 24 -8" class="mot"/>
  <circle cx="122" cy="182" r="10" class="numc"/><text x="122" y="186" class="num">1</text>

  <!-- 2 : volet mécanique -->
  <rect x="360" y="172" width="86" height="58" class="ch"/>
  <rect x="367" y="186" width="72" height="30" class="th"/>
  <text x="403" y="206" class="lb" text-anchor="middle">ATELIER</text>
  <path d="M 439 186 q 14 14 0 30" class="mot"/>
  <circle cx="371" cy="182" r="10" class="numc"/><text x="371" y="186" class="num">2</text>

  <!-- 3 : afficheur -->
  <rect x="460" y="170" width="330" height="68" class="dark"/>
  <text x="475" y="212" class="seg">HANGAR·DEMO 3</text>
  <line x1="770" y1="204" x2="745" y2="204" class="mot"/>
  <circle cx="472" cy="182" r="10" class="numc" fill="#666"/><text x="472" y="186" class="num">3</text>

  <!-- 4 : fréquence + indicatif -->
  <rect x="460" y="252" width="150" height="46" class="dark"/>
  <text x="478" y="284" class="seg" font-size="24">88.70</text>
  <rect x="626" y="252" width="164" height="46" class="ch"/>
  <text x="708" y="272" class="lb" text-anchor="middle">INDICATIF</text>
  <text x="708" y="288" class="an" text-anchor="middle" font-size="10">(station à nommer)</text>
  <circle cx="472" cy="264" r="10" class="numc" fill="#666"/><text x="472" y="268" class="num">4</text>

  <!-- 5 : ON AIR -->
  <circle cx="853" cy="196" r="14" class="ch"/>
  <circle cx="853" cy="196" r="7" fill="#222"/>
  <text x="853" y="228" class="lb" text-anchor="middle">ON AIR</text>
  <circle cx="884" cy="182" r="10" class="numc"/><text x="884" y="186" class="num">5</text>

  <!-- 6 : molette L'ONDE -->
  <circle cx="965" cy="285" r="55" class="ch"/>
  <circle cx="965" cy="285" r="46" class="th"/>
  <g stroke="#222" stroke-width="1">
    <line x1="965" y1="230" x2="965" y2="239"/><line x1="1020" y1="285" x2="1011" y2="285"/>
    <line x1="965" y1="340" x2="965" y2="331"/><line x1="910" y1="285" x2="919" y2="285"/>
    <line x1="1004" y1="246" x2="998" y2="252"/><line x1="1004" y1="324" x2="998" y2="318"/>
    <line x1="926" y1="246" x2="932" y2="252"/><line x1="926" y1="324" x2="932" y2="318"/>
  </g>
  <circle cx="965" cy="252" r="4" fill="#222"/>
  <text x="965" y="362" class="lb" text-anchor="middle">L'ONDE</text>
  <circle cx="1030" cy="238" r="10" class="numc"/><text x="1030" y="242" class="num">6</text>

  <!-- 7 : ÉJECT · 8 : ÉCOUTE -->
  <rect x="770" y="330" width="96" height="34" class="ch"/>
  <text x="818" y="352" class="lb" text-anchor="middle">ÉJECT ⏏</text>
  <circle cx="782" cy="326" r="10" class="numc"/><text x="782" y="330" class="num">7</text>
  <g>
    <rect x="140" y="336" width="18" height="30" rx="9" class="ch"/>
    <circle cx="149" cy="345" r="6" fill="#222"/>
    <text x="172" y="356" class="lb">ÉCOUTE</text>
    <circle cx="132" cy="326" r="10" class="numc"/><text x="132" y="330" class="num">8</text>
  </g>

  <!-- antenne -->
  <line x1="1100" y1="160" x2="1122" y2="110" class="ch"/>
  <line x1="1122" y1="110" x2="1136" y2="66" class="th"/>
  <line x1="1136" y1="66" x2="1144" y2="34" stroke="#222" stroke-width="0.7"/>
  <circle cx="1144" cy="31" r="3" class="th"/>

  <!-- légende -->
  <text x="80" y="440" font-size="13" fill="#111" letter-spacing="1">COMMANDES &amp; GESTES</text>
  <text x="80" y="464" class="an">1. VU « LIGNE ATELIER » — l'aiguille danse en continu, même son coupé : on VOIT que ça émet.</text>
  <text x="80" y="484" class="an">2. Volet mécanique ATELIER / TOI — bascule tout seul, avec un claquement, quand tu prends l'antenne.</text>
  <text x="80" y="504" class="an">3. Afficheur — défilement permanent du titre en cours ; « ??? » pour les fragments non expliqués.</text>
  <text x="80" y="524" class="an">4. Fréquence + indicatif — les mêmes qui s'afficheront sur le dash en Night Drive.</text>
  <text x="80" y="544" class="an">5. ON AIR — jamais éteinte. Respiration lente (~4 s). C'est l'état du monde, pas un bouton.</text>
  <text x="80" y="564" class="an">6. L'ONDE — molette crantée : tourner = dériver dans l'émission (avant/arrière dans le flux, avec grain) ;</text>
  <text x="80" y="580" class="an">   presser = se recaler sur le direct. C'est le seul « transport » de la machine.</text>
  <text x="80" y="600" class="an">7. ÉJECT — rendre l'antenne : l'atelier reprend son émission (qui a continué sans nous).</text>
  <text x="80" y="620" class="an">8. ÉCOUTE — couper le son ne coupe pas l'émission : l'aiguille continue de danser en silence.</text>

  <text x="80" y="660" font-size="13" fill="#111" letter-spacing="1">VIE AU REPOS</text>
  <text x="80" y="682" class="an">Aiguille synchrone avec la diffusion · scroll du titre · ON AIR qui respire · claquement du volet aux</text>
  <text x="80" y="698" class="an">changements · l'afficheur passe parfois en « ??? » — c'est ce qui fait lever les yeux.</text>

  <!-- inset Night Drive -->
  <g>
    <text x="720" y="660" font-size="13" fill="#111" letter-spacing="1">NIGHT DRIVE (D12)</text>
    <rect x="720" y="676" width="350" height="86" class="th"/>
    <rect x="742" y="700" width="306" height="40" class="ch"/>
    <rect x="752" y="710" width="70" height="20" class="dark"/>
    <text x="757" y="725" fill="#e8e8e8" font-size="11" letter-spacing="2">88.70</text>
    <circle cx="1022" cy="720" r="12" class="th"/>
    <text x="742" y="694" class="an" font-size="10">le format 2U ≈ le format 1-DIN : la façade glisse telle quelle dans le tableau de bord</text>
  </g>

  <!-- cartouche -->
  <g>
    <rect x="760" y="30" width="310" height="72" class="th"/>
    <line x1="760" y1="54" x2="1070" y2="54" class="th"/>
    <line x1="760" y1="78" x2="1070" y2="78" class="th"/>
    <text x="770" y="47" class="an">VINCENT 2000 OS — ÉMETTEUR « V2000 TX »</text>
    <text x="770" y="71" class="an">PROTO A / 3 — wireframe fonctionnel</text>
    <text x="770" y="95" class="an">2026-07-03 — aucune décision esthétique</text>
  </g>
</svg>
